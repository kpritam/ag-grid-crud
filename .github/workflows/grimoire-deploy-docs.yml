# Grimoire — Deploy generated docs site to GitHub Pages.
#
# Triggered by pushes to the default branch that touch `tome/**`.
# Generated by `grimoire init`. Safe to hand-edit.

name: Deploy docs

on:
  push:
    branches: [main, master]
    paths:
      - "tome/**"
      - ".github/workflows/grimoire-deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # NOTE: enable Pages once via Settings → Pages → Source: GitHub Actions.
      # `actions/configure-pages` requires that to be on (auto-enablement
      # needs administration:write, which the default GITHUB_TOKEN lacks).
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tome/site/package-lock.json

      - name: Install dependencies
        working-directory: tome/site
        run: npm ci

      - name: Build Docusaurus site
        working-directory: tome/site
        env:
          DOCS_URL: ${{ steps.pages.outputs.origin }}
          DOCS_BASE_URL: ${{ steps.pages.outputs.base_path }}/
          DOCS_ORG_NAME: ${{ github.repository_owner }}
          DOCS_PROJECT_NAME: ${{ github.event.repository.name }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: tome/site/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
