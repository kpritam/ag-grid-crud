# Grimoire — Deploy generated docs site to GitHub Pages.
#
# Triggered by pushes to the default branch that touch `docs/**`
# (the markdown sources OR the static-site app). Pages source is set to
# "GitHub Actions" by `configure-pages` with `enablement: true`, so
# the very first run on a fresh repo turns Pages on automatically — no
# manual Settings step required.
#
# Generated by `grimoire init`. Safe to hand-edit.

name: Deploy docs

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/grimoire-deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages only allows one active deployment at a time. Queue subsequent
# pushes instead of cancelling — cancelling mid-deploy can leave the
# Pages site in a half-published state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          # Auto-enable Pages on first run with `GitHub Actions` as the source.
          enablement: true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci

      # `configure-pages` returns `base_path` without a trailing slash
      # (`/repo` or `""` for user/org sites). Docusaurus requires a
      # trailing slash on `baseUrl`, so we normalise it here.
      - name: Build Docusaurus site
        working-directory: docs/site
        env:
          DOCS_URL: ${{ steps.pages.outputs.origin }}
          DOCS_BASE_URL: ${{ steps.pages.outputs.base_path }}/
          DOCS_ORG_NAME: ${{ github.repository_owner }}
          DOCS_PROJECT_NAME: ${{ github.event.repository.name }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/site/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
