# Grimoire — AI-powered docs sync.
#
# Opens a Pull Request with regenerated documentation on every push to
# the default branch. Generated by `grimoire init`. Safe to hand-edit.

name: Grimoire docs sync

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "tome/**"
      - ".grimoire/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Grimoire mode"
        type: choice
        options: [auto, cast, sync]
        default: auto
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: grimoire-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: npm install -g '@anthropic-ai/claude-code@^2'

      - uses: kpritam/grimoire@v0.1.8
        with:
          provider: claude
          mode: ${{ inputs.mode || 'auto' }}
          behavior: pr
          pr-title-prefix: "📖 docs(grimoire):"
          pr-branch: grimoire/docs-sync
          pr-labels: |
            documentation
            automated
            grimoire
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
