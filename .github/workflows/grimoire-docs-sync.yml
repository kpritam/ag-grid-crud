# Grimoire — AI-powered docs sync.
#
# Opens a Pull Request with regenerated documentation on every push to the
# default branch, plus a weekly safety-net cron. The PR title is prefixed
# `📖 docs(grimoire):` and the body is drafted by the configured agent
# from the actual diff — review gets a meaningful summary, not a template.
#
# Generated by `grimoire init`. Safe to hand-edit.

name: Grimoire docs sync

on:
  push:
    branches: [main, master]
    paths-ignore:
      # Avoid re-triggering when Grimoire itself merges the generated docs.
      - "docs/**"
      - ".grimoire/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Grimoire mode"
        type: choice
        options: [auto, cast, sync]
        default: auto
  schedule:
    # Monday 06:00 UTC — weekly sanity check.
    - cron: "0 6 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: grimoire-docs-${{ github.ref }}
  # Don't cancel an in-flight cast — cancelling mid-run wastes the provider
  # tokens already spent and can leave the working tree half-generated.
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Grimoire diffs HEAD against `.grimoire/seal.json`; a shallow
          # clone hides the commit range on subsequent runs.
          fetch-depth: 0

      # Pin the agent CLI to a major range so cron runs are reproducible.
      # Bump the major when intentionally adopting upstream breaking changes.
      - name: Install Claude Code CLI
        run: npm install -g '@anthropic-ai/claude-code@^2'

      - uses: kpritam/grimoire@0.1.3
        with:
          provider: claude-code
          mode: ${{ inputs.mode || 'auto' }}
          behavior: pr
          output: ./docs
          pr-title-prefix: "📖 docs(grimoire):"
          pr-branch: grimoire/docs-sync
          pr-labels: |
            documentation
            automated
            grimoire
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
